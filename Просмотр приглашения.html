<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Просмотр приглашения — Егор и Анна</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Jost",system-ui,sans-serif;
    background:#e7e1d8;
    background:
      radial-gradient(120% 90% at 50% -10%, #efe9e0 0%, #e7e1d8 55%, #ddd5c8 100%);
    color:#4a443d;
    overflow:hidden;
  }
  #root{height:100%;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>

<script type="text/babel">
const { useState, useRef, useLayoutEffect, useEffect } = React;

const SRC = encodeURI("Приглашение Егор и Анна.html");

/* ── авто-масштабирование устройства под доступную область ── */
function Stage({ w, h, padX = 56, padY = 40, children }) {
  const ref = useRef(null);
  const [scale, setScale] = useState(1);
  useLayoutEffect(() => {
    const el = ref.current;
    if (!el) return;
    const fit = () => {
      const pw = el.clientWidth - padX * 2;
      const ph = el.clientHeight - padY * 2;
      setScale(Math.max(Math.min(pw / w, ph / h, 1), 0.1));
    };
    fit();
    const ro = new ResizeObserver(fit);
    ro.observe(el);
    window.addEventListener('resize', fit);
    return () => { ro.disconnect(); window.removeEventListener('resize', fit); };
  }, [w, h, padX, padY]);
  return (
    <div ref={ref} style={{
      flex: 1, minHeight: 0, display: 'flex',
      alignItems: 'center', justifyContent: 'center', overflow: 'hidden',
    }}>
      <div style={{ width: w, height: h, transform: `scale(${scale})`, transformOrigin: 'center center', flexShrink: 0 }}>
        {children}
      </div>
    </div>
  );
}

function Frame() {
  return (
    <iframe
      src={SRC}
      title="Приглашение"
      style={{ width: '100%', height: '100%', border: 0, display: 'block' }}
    />
  );
}

/* ── сегментированный переключатель ── */
function Toggle({ mode, setMode }) {
  const opts = [
    { id: 'mobile', label: 'Мобильный', icon: (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><rect x="6.5" y="2.5" width="11" height="19" rx="2.5"/><line x1="10.5" y1="18.5" x2="13.5" y2="18.5"/></svg>
    )},
    { id: 'desktop', label: 'ПК', icon: (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="2.5" y="4" width="19" height="13" rx="2"/><line x1="9" y1="21" x2="15" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    )},
  ];
  return (
    <div style={{
      display: 'inline-flex', padding: 4, gap: 4, borderRadius: 999,
      background: 'rgba(255,255,255,0.55)', border: '1px solid #ddd1c2',
      boxShadow: '0 6px 20px -10px rgba(120,98,74,0.45)', backdropFilter: 'blur(8px)',
    }}>
      {opts.map(o => {
        const active = mode === o.id;
        return (
          <button key={o.id} onClick={() => setMode(o.id)} style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '9px 20px', borderRadius: 999, border: 0, cursor: 'pointer',
            fontFamily: 'Jost, sans-serif', fontSize: 13, fontWeight: 400,
            letterSpacing: '0.04em',
            background: active ? '#4a443d' : 'transparent',
            color: active ? '#faf6f1' : '#6f675c',
            transition: 'background .3s ease, color .3s ease',
          }}>
            {o.icon}{o.label}
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [mode, setMode] = useState('mobile');
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* шапка */}
      <header style={{
        flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 16, padding: '16px 24px', flexWrap: 'wrap',
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12 }}>
          <span style={{ fontFamily: 'Cormorant Garamond, serif', fontSize: 26, color: '#4a443d', lineHeight: 1 }}>Егор&nbsp;и&nbsp;Анна</span>
          <span style={{ fontSize: 11, letterSpacing: '0.28em', textTransform: 'uppercase', color: '#9a9085' }}>Просмотр</span>
        </div>
        <Toggle mode={mode} setMode={setMode} />
        <div style={{ width: 120, textAlign: 'right', fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: '#b3a896' }}>20·08·26</div>
      </header>

      {/* сцена — оба устройства всегда смонтированы и измеряются; переключаем видимость (сохраняет состояние) */}
      <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>
        <div style={{
          position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
          visibility: mode === 'mobile' ? 'visible' : 'hidden',
          opacity: mode === 'mobile' ? 1 : 0,
          pointerEvents: mode === 'mobile' ? 'auto' : 'none',
          transition: 'opacity .35s ease',
        }}>
          <Stage w={402} h={874}>
            <IOSDevice width={402} height={874}>
              <Frame />
            </IOSDevice>
          </Stage>
        </div>
        <div style={{
          position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
          visibility: mode === 'desktop' ? 'visible' : 'hidden',
          opacity: mode === 'desktop' ? 1 : 0,
          pointerEvents: mode === 'desktop' ? 'auto' : 'none',
          transition: 'opacity .35s ease',
        }}>
          <Stage w={1180} h={748}>
            <ChromeWindow width={1180} height={748} url="invitelove · Егор и Анна" tabs={[{ title: 'Егор и Анна · 20.08.26' }]}>
              <Frame />
            </ChromeWindow>
          </Stage>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
